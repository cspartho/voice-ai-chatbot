services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - WHISPER_MODEL=base
      - WHISPER_PRELOAD=1
      # Restrict in production, e.g. ALLOWED_ORIGINS=https://yourdomain.com
      - ALLOWED_ORIGINS=*
    volumes:
      # Persist the downloaded Whisper model across restarts.
      - whisper-cache:/root/.cache/huggingface
    ports:
      - "8000:8000" # direct access for testing/curl; the frontend uses the proxy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  whisper-cache:
