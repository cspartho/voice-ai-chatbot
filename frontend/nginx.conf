server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Recordings are uploaded to /api/transcribe — allow generous bodies.
    client_max_body_size 25m;

    # Static frontend (SPA fallback to index.html).
    location / {
        try_files $uri /index.html;
    }

    # API -> backend. The trailing slash on proxy_pass strips the /api/ prefix,
    # so /api/transcribe reaches the backend as /transcribe.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # STT/LLM/TTS can take a while (esp. the first model load).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket endpoint (kept for completeness; HTTP endpoints are the main path).
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }
}
